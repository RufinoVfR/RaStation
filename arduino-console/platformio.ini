; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
; LiquidCrystal está vendorizada em lib/LiquidCrystal (ver README lá dentro
; do motivo) em vez de vir do Library Registry.

; Ambiente nativo para rodar testes no PC (sem Arduino)
; main.cpp fica de fora: ele tem setup()/loop() do Arduino, sem int main(),
; e cada arquivo em test/ já define o seu próprio main() via Unity.
[env:native]
platform = native
build_flags =
  -std=c++11
  -DNATIVE_TEST
  -DUNIT_TEST
  -I test/mocks
build_src_filter = +<*> -<main.cpp>
test_build_src = true
